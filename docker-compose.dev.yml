name: drssed-backend-dev

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-dev
    command:
      - --event-scheduler=ON
      - --mysqlx=OFF
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD:-}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USERNAME}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_INITDB_SKIP_TZINFO: "1"
    volumes:
      - mysql_data_dev:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "${DATABASE_USERNAME}", "-p${DATABASE_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: redis-dev
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis_data_dev:/data
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - backend
    logging: *default-logging

  api:
    build:
      context: .
    image: drssed-api:dev
    container_name: api-dev
    env_file: .env
    # Dev: mount source over the image so code edits are live.
    # The empty named volumes mask host caches that would conflict with
    # the container's Python environment.
    volumes:
      - ./:/app
      - dev_pycache:/app/__pycache__
      - dev_venv:/app/venv
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    init: true
    command: ["gunicorn", "-c", "gunicorn.conf.py", "--reload", "main:api"]
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:8000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    networks:
      - backend
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  image-worker:
      build:
        context: .
      image: drssed-api:dev
      container_name: image-worker-dev
      command: ["worker"]
      env_file: .env
      volumes:
        - ./:/app
        - dev_pycache:/app/__pycache__
        - dev_venv:/app/venv
      depends_on:
        redis:
          condition: service_healthy
      restart: unless-stopped
      init: true
      networks:
        - backend
      logging:
        driver: "json-file"
        options:
          max-size: "10m"
          max-file: "5"

networks:
  backend:
    driver: bridge

volumes:
  mysql_data_dev:
  redis_data_dev:
  dev_pycache:
  dev_venv:
